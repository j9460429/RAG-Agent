# Windows Docker Desktop override
# Usage: docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d
#
# Differences from base compose:
#   1. skill-executor: Docker socket path compatible with Docker Desktop for Windows (WSL2)
#   2. Memory limits raised to be explicit (Docker Desktop for Windows defaults to 2GB total)
#   3. Added dns: to avoid potential Windows DNS resolution issues

name: nexusmind

services:
  app:
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 1G

  marker:
    deploy:
      resources:
        limits:
          memory: 1G

  lightrag:
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 2G

  skill-executor:
    # Docker Desktop for Windows (WSL2): socket is accessible via the same path inside the container.
    # If you get permission errors, enable "Allow the default Docker socket to be used"
    # in Docker Desktop Settings → Advanced
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - skills-data:/data/skills
    user: "root"
    deploy:
      resources:
        limits:
          memory: 512M
